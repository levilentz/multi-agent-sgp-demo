# Starts the full AgentEx stack (backend infrastructure + UI) alongside all 4 demo agents.
# Requires Docker Compose v2.20+ for the `include` directive.
#
# One-time setup — NEXT_PUBLIC_ vars are baked into the UI at build time, so copy the env
# file before running `docker compose up --build` for the first time:
#
#   cp scale-agentex/agentex-ui/example.env.development scale-agentex/agentex-ui/.env.local

include:
  - ./scale-agentex/agentex/docker-compose.yml

networks:
  agentex-network:
    name: agentex-network

services:

  # ── AgentEx UI (port 3000) ────────────────────────────────────────────────
  agentex-ui:
    build:
      context: ./scale-agentex
      dockerfile: agentex-ui/Dockerfile
      args:
        SOURCE_DIR: agentex-ui
    ports:
      - "3001:3000"
    networks:
      - agentex-network
    depends_on:
      agentex:
        condition: service_healthy
    restart: unless-stopped

  # ── Async Chat Agent (port 8001) ─────────────────────────────────────────
  async-chat-agent:
    build:
      context: ./async_chat_agent_example
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - AGENTEX_API_BASE_URL=http://agentex:5003
      - AGENTEX_BASE_URL=http://agentex:5003
      - AGENT_NAME=anthropic-chat-agent-example
      - ACP_URL=http://async-chat-agent
      - ACP_PORT=8000
      - ACP_TYPE=sync
      - REDIS_URL=redis://agentex-redis:6379
    networks:
      - agentex-network
    depends_on:
      agentex:
        condition: service_healthy
    restart: unless-stopped

  # ── LangChain Chat Agent (port 8002) ─────────────────────────────────────
  langchain-chat-agent:
    build:
      context: ./langchain_chat_agent_example
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - AGENTEX_API_BASE_URL=http://agentex:5003
      - AGENTEX_BASE_URL=http://agentex:5003
      - AGENT_NAME=langchain-chat-agent-example
      - ACP_URL=http://langchain-chat-agent
      - ACP_PORT=8000
      - ACP_TYPE=sync
      - REDIS_URL=redis://agentex-redis:6379
    networks:
      - agentex-network
    depends_on:
      agentex:
        condition: service_healthy
    restart: unless-stopped

  # ── Sync Chat Agent (port 8003) ───────────────────────────────────────────
  sync-chat-agent:
    build:
      context: ./sync_chat_agent_example
      dockerfile: Dockerfile
    ports:
      - "8003:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - AGENTEX_API_BASE_URL=http://agentex:5003
      - AGENTEX_BASE_URL=http://agentex:5003
      - AGENT_NAME=basic-chat-agent-example
      - ACP_URL=http://sync-chat-agent
      - ACP_PORT=8000
      - ACP_TYPE=sync
      - REDIS_URL=redis://agentex-redis:6379
    networks:
      - agentex-network
    depends_on:
      agentex:
        condition: service_healthy
    restart: unless-stopped

  # ── Multi-Model Chat Agent (port 8005) ────────────────────────────────────
  multi-model-chat-agent:
    build:
      context: ./multi_model_chat_agent
      dockerfile: Dockerfile
    ports:
      - "8005:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - AGENTEX_API_BASE_URL=http://agentex:5003
      - AGENTEX_BASE_URL=http://agentex:5003
      - AGENT_NAME=multi-model-chat-agent
      - ACP_URL=http://multi-model-chat-agent
      - ACP_PORT=8000
      - ACP_TYPE=sync
      - REDIS_URL=redis://agentex-redis:6379
      - MODEL_1=openai/gpt-4o
      - MODEL_2=openai/gpt-4o-mini
      - MODEL_3=anthropic/claude-3-5-sonnet-20241022
    networks:
      - agentex-network
    depends_on:
      agentex:
        condition: service_healthy
    restart: unless-stopped

  # ── Temporal Chat Agent — ACP server (port 8004) ──────────────────────────
  temporal-chat-agent:
    build:
      context: ./temporal_chat_agent_example
      dockerfile: Dockerfile
    ports:
      - "8004:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - AGENTEX_API_BASE_URL=http://agentex:5003
      - AGENTEX_BASE_URL=http://agentex:5003
      - AGENT_NAME=temporal-chat-agent-example
      - ACP_URL=http://temporal-chat-agent
      - ACP_PORT=8000
      - ACP_TYPE=agentic
      - REDIS_URL=redis://agentex-redis:6379
      - TEMPORAL_ADDRESS=agentex-temporal:7233
      - TEMPORAL_HOST=agentex-temporal
      - WORKFLOW_NAME=temporal-chat-agent-example
      - WORKFLOW_TASK_QUEUE=temporal_chat_agent_example_queue
    networks:
      - agentex-network
    depends_on:
      agentex:
        condition: service_healthy
    restart: unless-stopped

  # ── Temporal Chat Agent — Worker ──────────────────────────────────────────
  temporal-chat-worker:
    build:
      context: ./temporal_chat_agent_example
      dockerfile: Dockerfile
    command: ["python", "-m", "project.run_worker"]
    env_file:
      - path: .env
        required: false
    environment:
      - AGENTEX_API_BASE_URL=http://agentex:5003
      - AGENTEX_BASE_URL=http://agentex:5003
      - AGENT_NAME=temporal-chat-agent-example
      - ACP_URL=http://temporal-chat-agent
      - ACP_PORT=8000
      - ACP_TYPE=agentic
      - REDIS_URL=redis://agentex-redis:6379
      - TEMPORAL_ADDRESS=agentex-temporal:7233
      - TEMPORAL_HOST=agentex-temporal
      - WORKFLOW_NAME=temporal-chat-agent-example
      - WORKFLOW_TASK_QUEUE=temporal_chat_agent_example_queue
    networks:
      - agentex-network
    depends_on:
      agentex:
        condition: service_healthy
    restart: unless-stopped
